name: AI PR Review

# Triggers on new PRs and on every new commit pushed to an open PR.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read        # needed to checkout the repo and read diff
  pull-requests: write  # needed to post a comment on the PR

jobs:
  ai-review:
    name: Analyze PR with Claude AI
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout with full history so we can diff against the base branch ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for accurate diffs

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: task4/requirements.txt

      # ── 3. Install script dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: pip install --quiet -r task4/requirements.txt

      # ── 4. Build the diff between PR head and base branch ───────────────────
      - name: Generate git diff
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" > /tmp/pr_diff.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

      # ── 5. Run AI review and post comment ───────────────────────────────────
      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          DIFF_FILE:         /tmp/pr_diff.txt
        run: python task4/ai_review.py
